name: Update twstock snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * 1-5"

permissions:
  contents: write

jobs:
  update-market-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install twstock
        run: python -m pip install --upgrade twstock

      - name: Generate static market snapshot
        run: |
          mkdir -p public
          node scripts/export_tracked_tickers.mjs --output public/tracked-tickers.json
          python scripts/update_twstock_snapshot.py \
            --tickers-file public/tracked-tickers.json \
            --output public/market-snapshot.json

      - name: Commit updated snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update twstock market snapshot"
          file_pattern: public/market-snapshot.json public/tracked-tickers.json
